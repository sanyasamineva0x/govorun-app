name: Govorun

options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete

schemes:
  Govorun:
    build:
      targets:
        Govorun: all
        GovorunTests: [test]
    test:
      targets:
        - GovorunTests

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.2"

targets:
  Govorun:
    type: application
    platform: macOS
    dependencies:
      - package: Sparkle
    sources:
      - path: Govorun
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.govorun.app
        INFOPLIST_FILE: Govorun/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Govorun
        MARKETING_VERSION: "0.2.1b"
        CURRENT_PROJECT_VERSION: 2
        CODE_SIGN_ENTITLEMENTS: Govorun/Govorun.entitlements
    configSettings:
      Debug:
        ENABLE_HARDENED_RUNTIME: true
      Release:
        ENABLE_HARDENED_RUNTIME: true
    postCompileScripts: []
    preBuildScripts: []
    copyFiles:
      - destination: resources
        subpath: worker
        buildPhase: resourcesBuildPhase
        files:
          - path: worker/server.py
          - path: worker/setup.sh
          - path: worker/requirements.txt
          - path: worker/VERSION
          - path: worker/wheels
            type: folder
      - destination: frameworks
        buildPhase: frameworksBuildPhase
        files:
          - path: Frameworks/Python.framework
            codeSign: true
  GovorunTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GovorunTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.govorun.app.tests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Govorun
