name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  swift-tests:
    name: Swift Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Govorun \
            -destination 'platform=macOS' \
            | tee /tmp/xcodebuild.log | tail -20
          grep "Executed" /tmp/xcodebuild.log | tail -1

  python-tests:
    name: Python Worker Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd worker
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd worker
          python -m pytest test_server.py -v
